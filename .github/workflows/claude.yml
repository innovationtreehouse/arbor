name: Claude

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [labeled, synchronize]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Set AGENT_NAME from a repository variable (Settings → Variables).
# Falls back to "Squirrel" if the variable is not configured.
env:
  AGENT_NAME: ${{ vars.AGENT_NAME || 'Squirrel' }}
  BOT_ACTOR:  ${{ vars.BOT_ACTOR }}

jobs:
  # ---------------------------------------------------------------------------
  # New issue → propose implementation in a PR
  # ---------------------------------------------------------------------------

  claude-issue:
    name: Propose implementation
    runs-on: ubuntu-latest
    continue-on-error: true
    if: >
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'labeled') &&
      contains(github.event.issue.labels.*.name, 'claude')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: claude-issue-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        id: prompt
        run: node scripts/build-claude-prompt.js
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}

      - name: Run Claude
        if: steps.prompt.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_TOKEN }}
          github_token:      ${{ secrets.AGENT_TOKEN }}
          prompt:     ${{ steps.prompt.outputs.prompt }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git fetch *)", "Bash(git checkout *)",
                  "Bash(git add *)", "Bash(git commit *)", "Bash(git push *)",
                  "Bash(gh pr create *)", "Bash(gh issue comment *)", "Edit()", "Write()","Grep()","Glob()"
                ],
                "deny": [
                  "Edit(.github/**)", "Write(.github/**)"
                ]
              }
            }

  # ---------------------------------------------------------------------------
  # Comment on a plain issue → update the related PR
  # ---------------------------------------------------------------------------

  claude-issue-comment:
    name: Update PR from issue comment
    runs-on: ubuntu-latest
    continue-on-error: true
    if: >
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'claude') &&
      github.event.comment.user.login != vars.BOT_ACTOR
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: claude-issue-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        id: prompt
        run: node scripts/build-claude-prompt.js
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}

      - name: Run Claude
        if: steps.prompt.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_TOKEN }}
          github_token:      ${{ secrets.AGENT_TOKEN }}
          prompt:     ${{ steps.prompt.outputs.prompt }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git fetch *)", "Bash(git checkout *)",
                  "Bash(git add *)", "Bash(git commit *)", "Bash(git push *)",
                  "Bash(gh issue comment *)","Edit()", "Write()","Grep()","Glob()"
                ],
                "deny": [
                  "Edit(.github/**)", "Write(.github/**)"
                ]
              }
            }

  # ---------------------------------------------------------------------------
  # PR opened/updated (not Claude's) → post a review
  # ---------------------------------------------------------------------------

  claude-pr-review:
    name: Review pull request
    runs-on: ubuntu-latest
    continue-on-error: true
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.pull_requests[0] != null &&
       !startsWith(github.event.workflow_run.head_branch, 'claude/')) ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'claude' &&
       !startsWith(github.event.pull_request.head.ref, 'claude/'))
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      issues: write
    concurrency:
      group: >-
        claude-pr-review-${{
          github.event_name == 'pull_request' &&
          github.event.pull_request.number ||
          github.event.workflow_run.pull_requests[0].number
        }}
      cancel-in-progress: true

    steps:
      - name: Warn if BOT_ACTOR is unset
        if: vars.BOT_ACTOR == ''
        run: |
          echo "::warning::BOT_ACTOR repository variable is not set. The claude/pr-review status check will always report failure because review authorship cannot be verified. Configure BOT_ACTOR in Settings → Variables."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        id: prompt
        run: node scripts/build-claude-prompt.js
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}

      - name: Run Claude
        id: claude
        if: steps.prompt.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_TOKEN }}
          github_token:      ${{ secrets.AGENT_TOKEN }}
          prompt:            ${{ steps.prompt.outputs.prompt }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(gh pr review *)", "Bash(gh pr edit *)","Grep()","Glob()"]
              },
              "maxThinkingTokens": 1024
            }

      - name: Report review status
        if: always() && steps.prompt.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}
          OUTCOME: ${{ steps.claude.outcome }}
          SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
          REPO: ${{ github.repository }}
        run: |
          review_count=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json reviews \
            | jq --arg actor "$BOT_ACTOR" \
                '[.reviews[] | select(.author.login == $actor)] | length' \
            2>/dev/null) || review_count=0
          if [ "$OUTCOME" = "success" ] && [ "$review_count" -gt 0 ]; then
            STATE=success
            DESC="Code review posted"
          elif [ "$OUTCOME" = "success" ]; then
            STATE=failure
            DESC="Review not posted by bot"
          else
            STATE=failure
            DESC="Code review failed"
          fi
          gh api "repos/$REPO/statuses/$SHA" \
            -f state="$STATE" \
            -f context="claude/pr-review" \
            -f description="$DESC" \
            --silent

      - name: Apply reviewed label
        if: steps.claude.conclusion == 'success' && steps.prompt.outputs.skip != 'true'
        run: |
          gh label create reviewed --color "0075ca" --description "Reviewed by Claude" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label reviewed
        env:
          GH_TOKEN: ${{ secrets.AGENT_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}

  # ---------------------------------------------------------------------------
  # PR synchronize (new commits pushed) → clear status, check prior concerns
  # ---------------------------------------------------------------------------

  claude-pr-synchronize:
    name: Check prior comments after synchronize
    runs-on: ubuntu-latest
    continue-on-error: true
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      contains(github.event.pull_request.labels.*.name, 'claude') &&
      !startsWith(github.event.pull_request.head.ref, 'claude/')
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    concurrency:
      group: claude-pr-synchronize-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Clear pr-review status
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state="pending" \
            -f context="claude/pr-review" \
            -f description="Re-checking after new commits" \
            --silent

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        id: prompt
        run: node scripts/build-claude-prompt.js
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}

      - name: Run Claude
        if: steps.prompt.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_TOKEN }}
          github_token:      ${{ secrets.AGENT_TOKEN }}
          prompt:            ${{ steps.prompt.outputs.prompt }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(gh pr comment *)","Grep()","Glob()"]
              }
            }

  # ---------------------------------------------------------------------------
  # Comment on Claude's own PR → address the feedback
  # Handles both timeline comments (issue_comment) and inline diff comments
  # (pull_request_review_comment).  The build-claude-prompt script outputs
  # skip=true if the PR head branch does not start with "claude/".
  # ---------------------------------------------------------------------------

  claude-pr-comment:
    name: Address PR comment
    runs-on: ubuntu-latest
    continue-on-error: true
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.action == 'created' &&
       github.event.issue.pull_request &&
       github.event.comment.user.login != vars.BOT_ACTOR) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.action == 'created' &&
       github.event.comment.user.login != vars.BOT_ACTOR)
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: >-
        claude-pr-comment-${{
          github.event.issue.number ||
          github.event.pull_request.number
        }}
      cancel-in-progress: false

    steps:
      - name: Warn if BOT_ACTOR is unset
        if: vars.BOT_ACTOR == ''
        run: |
          echo "::warning::BOT_ACTOR repository variable is not set. The bot comment loop guard is inactive — the agent may respond to its own comments. Configure BOT_ACTOR in Settings → Variables."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        id: prompt
        run: node scripts/build-claude-prompt.js
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}

      - name: Run Claude
        if: steps.prompt.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_TOKEN }}
          github_token:      ${{ secrets.AGENT_TOKEN }}
          prompt:     ${{ steps.prompt.outputs.prompt }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git fetch *)", "Bash(git checkout *)",
                  "Bash(git add *)", "Bash(git commit *)", "Bash(git push *)",
                  "Bash(gh pr review *)", "Bash(gh pr comment *)","Grep()","Glob()"
                ],
                "deny": [
                  "Edit(.github/**)", "Write(.github/**)"
                ]
              }
            }
