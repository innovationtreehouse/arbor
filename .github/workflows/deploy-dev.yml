name: Deploy to Dev

on:
  # Only deploy when CI passes — prevents a broken push to main from deploying.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # required for OIDC → AWS
  contents: read    # required for checkout
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: none
  statuses: none

concurrency:
  group: deploy-dev
  cancel-in-progress: false  # queue rather than cancel — migrations must not interleave

jobs:
  deploy-dev:
    name: deploy / dev
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build -t $REGISTRY/arbor-agent:$SHA \
                       -t $REGISTRY/arbor-agent:dev \
                       -f packages/agent/Dockerfile .
          docker push $REGISTRY/arbor-agent:$SHA
          docker push $REGISTRY/arbor-agent:dev

      - name: Verify image is pullable (dev)
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "Image $SHA confirmed in ECR."

      - name: Scan image for vulnerabilities (dev)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/arbor-agent:${{ github.event.workflow_run.head_sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build Lambda zip
        run: |
          npm run build
          test -d packages/lambda/dist || { echo "packages/lambda/dist not found — build may have failed"; exit 1; }
          cd packages/lambda/dist && zip -r ../lambda.zip .

      - name: Upload Lambda zip to S3
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          DIGEST=$(sha256sum packages/lambda/lambda.zip | awk '{print $1}')
          aws s3 cp packages/lambda/lambda.zip s3://$BUCKET/arbor-webhook/$SHA.zip
          # Store digest in SSM so it cannot be replaced by the same credentials
          # that can overwrite the S3 artifact.
          aws ssm put-parameter \
            --name "/arbor/artifacts/$SHA/sha256" \
            --value "$DIGEST" \
            --type String \
            --overwrite

      - name: Run database migrations (dev)
        # Migrations run before code deploy. If a subsequent step fails and you
        # need to roll back, Drizzle has no built-in down migrations — revert by
        # applying a new migration that undoes the schema change.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: cd packages/db && npm run db:migrate

      - name: Deploy Lambda (dev)
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-dev \
            --s3-bucket $BUCKET \
            --s3-key arbor-webhook/$SHA.zip

      - name: Wait for Lambda update (dev)
        run: aws lambda wait function-updated --function-name arbor-webhook-dev

      - name: Register ECS task definition (dev)
        id: register-task-def-dev
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-agent-dev \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img' \
          > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (dev)
        run: |
          aws ecs update-service \
            --cluster arbor-dev \
            --service arbor-agent-dev \
            --task-definition ${{ steps.register-task-def-dev.outputs.task_def_arn }} \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (dev)
        # If this step fails the service is degraded. Manual rollback:
        #   aws ecs update-service --cluster arbor-dev --service arbor-agent-dev \
        #     --task-definition arbor-agent-dev:<previous-revision>
        run: |
          aws ecs wait services-stable \
            --cluster arbor-dev \
            --services arbor-agent-dev

      - name: Smoke test (dev)
        env:
          API_URL: ${{ secrets.API_URL_DEV }}
        run: |
          # Test 1: bad signature → 401 with expected body
          STATUS=$(curl -s -o /tmp/smoke-body -w "%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test 1 failed: expected 401, got $STATUS"
            exit 1
          fi
          if ! grep -q "Invalid signature" /tmp/smoke-body; then
            echo "Smoke test 1 failed: unexpected body: $(cat /tmp/smoke-body)"
            exit 1
          fi

          # Test 2: unknown path → 404 (verifies routing is live)
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/healthz")
          if [ "$STATUS2" != "404" ]; then
            echo "Smoke test 2 failed: expected 404 on /healthz, got $STATUS2"
            exit 1
          fi

          echo "Smoke tests passed."
