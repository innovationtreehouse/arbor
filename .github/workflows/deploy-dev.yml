name: Deploy to Dev

on:
  # Only deploy when CI passes — prevents a broken push to main from deploying.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # required for OIDC → AWS
  contents: read    # required for checkout
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: none
  statuses: none

concurrency:
  group: deploy-dev
  cancel-in-progress: false  # queue rather than cancel — migrations must not interleave

jobs:
  deploy-dev:
    name: deploy / dev
    runs-on: ubuntu-24.04-arm
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            --push \
            -t $REGISTRY/arbor-agent:$SHA \
            -t $REGISTRY/arbor-agent:dev \
            -f packages/agent/Dockerfile .

      - name: Verify image is pullable (dev)
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "Image $SHA confirmed in ECR."

      - name: Build Lambda zip
        run: |
          npm run build
          test -f packages/lambda/dist/index.bundle.js || { echo "Lambda bundle not found — build may have failed"; exit 1; }
          # esbuild produces a single self-contained bundle; zip just that file.
          # The handler is index.handler — Lambda resolves index → index.bundle.js
          # via the main field, but simpler to name it index.js in the zip.
          mkdir -p packages/lambda/pkg
          cp packages/lambda/dist/index.bundle.js packages/lambda/pkg/index.js
          cd packages/lambda/pkg && zip -r ../lambda.zip .

      - name: Upload Lambda zip to S3
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          DIGEST=$(sha256sum packages/lambda/lambda.zip | awk '{print $1}')
          aws s3 cp packages/lambda/lambda.zip s3://$BUCKET/arbor-webhook/$SHA.zip
          # Store digest in SSM. --no-overwrite means a second run for the same
          # SHA fails loudly rather than silently replacing a previously written
          # digest, preventing a compromised runner from swapping it after the fact.
          aws ssm put-parameter \
            --name "/arbor/artifacts/$SHA/sha256" \
            --value "$DIGEST" \
            --type String \
            --no-overwrite

      - name: Run database migrations (dev)
        # Runs drizzle-kit migrate in a short-lived ECS task inside the VPC,
        # so the DB does not need to be reachable from GitHub Actions runners.
        # Migrations run before code deploy — if a subsequent step fails and you
        # need to roll back, apply a new migration that undoes the schema change.
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster arbor-dev \
            --task-definition arbor-migrate-dev \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS_DEV }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID_DEV }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"arbor-migrate\",\"environment\":[{\"name\":\"DATABASE_URL\",\"value\":\"${{ secrets.DATABASE_URL_DEV }}\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster arbor-dev --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster arbor-dev --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations complete."

      - name: Deploy Lambda (dev)
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-dev \
            --s3-bucket $BUCKET \
            --s3-key arbor-webhook/$SHA.zip

      - name: Wait for Lambda update (dev)
        run: aws lambda wait function-updated --function-name arbor-webhook-dev

      - name: Register ECS task definition (dev)
        id: register-task-def-dev
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-agent-dev \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img
               | .runtimePlatform = {"cpuArchitecture": "ARM64", "operatingSystemFamily": "LINUX"}' \
          > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (dev)
        run: |
          aws ecs update-service \
            --cluster arbor-dev \
            --service arbor-agent-dev \
            --task-definition "${{ steps.register-task-def-dev.outputs.task_def_arn }}" \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (dev)
        # If this step fails the service is degraded. Manual rollback:
        #   aws ecs update-service --cluster arbor-dev --service arbor-agent-dev \
        #     --task-definition arbor-agent-dev:<previous-revision>
        run: |
          aws ecs wait services-stable \
            --cluster arbor-dev \
            --services arbor-agent-dev

      - name: Smoke test (dev)
        env:
          API_URL: ${{ secrets.API_URL_DEV }}
        run: |
          # Test 1: bad signature → 401 with non-empty body
          # Checks status code and that the Lambda returned a body (not a gateway
          # error or empty response), without coupling to exact error wording.
          STATUS=$(curl -s -o /tmp/smoke-body -w "%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test 1 failed: expected 401, got $STATUS"
            exit 1
          fi
          if [ ! -s /tmp/smoke-body ]; then
            echo "Smoke test 1 failed: empty response body"
            exit 1
          fi

          # Test 2: nonsense path → 404 (verifies routing is live)
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/no-such-route-xyzzy")
          if [ "$STATUS2" != "404" ]; then
            echo "Smoke test 2 failed: expected 404 on /no-such-route-xyzzy, got $STATUS2"
            exit 1
          fi

          echo "Smoke tests passed."
