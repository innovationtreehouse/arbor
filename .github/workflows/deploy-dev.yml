name: Deploy to Dev

on:
  # Only deploy when CI passes — prevents a broken push to main from deploying.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write      # required for OIDC → AWS
  contents: read       # required for checkout and git log
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: write # required to comment on merged PRs
  statuses: none

concurrency:
  group: deploy-dev
  cancel-in-progress: false  # queue rather than cancel — migrations must not interleave

jobs:
  deploy-dev:
    name: deploy / dev
    runs-on: ubuntu-24.04-arm
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check holdoff
        if: vars.DEPLOY_PAUSED == 'true'
        run: |
          echo "::notice::Deployments are paused (DEPLOY_PAUSED=true). Set the variable to false in repo settings to resume."
          exit 1

      - name: Skip if newer SHA has passed CI
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # If a newer commit on main has already passed CI, skip this deploy.
          # Combined with cancel-in-progress: false, this means queued deploys
          # will no-op and let the latest one do the real work.
          LATEST_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha' 2>/dev/null || echo "")
          if [ -n "$LATEST_SHA" ] && [ "$LATEST_SHA" != "$SHA" ]; then
            echo "::notice::Skipping deploy of ${SHA:0:8} — newer SHA ${LATEST_SHA:0:8} has already passed CI."
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0  # needed for git log to find merged PRs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            --push \
            -t $REGISTRY/arbor-agent:$SHA \
            -t $REGISTRY/arbor-agent:dev \
            -f packages/agent/Dockerfile .

      - name: Verify image is pullable (dev)
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "Image $SHA confirmed in ECR."

      - name: Build Lambda zip
        run: |
          npm run build
          test -f packages/lambda/dist/index.bundle.js || { echo "Lambda bundle not found — build may have failed"; exit 1; }
          # esbuild produces a single self-contained bundle; zip just that file
          # as index.js so the Lambda handler index.handler resolves correctly.
          mkdir -p packages/lambda/pkg
          cp packages/lambda/dist/index.bundle.js packages/lambda/pkg/index.js
          cd packages/lambda/pkg && zip -r ../lambda.zip .

      - name: Upload Lambda zip to S3
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          DIGEST=$(sha256sum packages/lambda/lambda.zip | awk '{print $1}')
          aws s3 cp packages/lambda/lambda.zip s3://$BUCKET/arbor-webhook/$SHA.zip
          # Store digest in SSM. --no-overwrite means a second run for the same
          # SHA fails loudly rather than silently replacing a previously written
          # digest, preventing a compromised runner from swapping it after the fact.
          # If the parameter already exists (re-run of same SHA), verify the digest
          # matches rather than failing — idempotent re-runs are safe, swapped
          # digests are not.
          EXISTING=$(aws ssm get-parameter \
            --name "/arbor/artifacts/$SHA/sha256" \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            if [ "$EXISTING" != "$DIGEST" ]; then
              echo "Digest mismatch for existing SSM parameter — possible tampering"
              echo "  stored:   $EXISTING"
              echo "  computed: $DIGEST"
              exit 1
            fi
            echo "SSM parameter already exists with matching digest — skipping write."
          else
            aws ssm put-parameter \
              --name "/arbor/artifacts/$SHA/sha256" \
              --value "$DIGEST" \
              --type String \
              --no-overwrite
          fi

      - name: Run database migrations (dev)
        # Runs drizzle-kit migrate in a short-lived ECS task inside the VPC,
        # so the DB does not need to be reachable from GitHub Actions runners.
        # Migrations run before code deploy — if a subsequent step fails and you
        # need to roll back, apply a new migration that undoes the schema change.
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster arbor-dev \
            --task-definition arbor-migrate-dev \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS_DEV }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID_DEV }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"arbor-migrate\",\"environment\":[{\"name\":\"DATABASE_URL\",\"value\":\"${{ secrets.DATABASE_URL_DEV }}\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster arbor-dev --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster arbor-dev --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations complete."

      - name: Deploy Lambda (dev)
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-dev \
            --s3-bucket $BUCKET \
            --s3-key arbor-webhook/$SHA.zip

      - name: Wait for Lambda update (dev)
        run: aws lambda wait function-updated --function-name arbor-webhook-dev

      - name: Set Lambda handler (dev)
        run: |
          CURRENT=$(aws lambda get-function-configuration \
            --function-name arbor-webhook-dev \
            --query 'Handler' --output text)
          if [ "$CURRENT" != "index.handler" ]; then
            aws lambda update-function-configuration \
              --function-name arbor-webhook-dev \
              --handler index.handler
            aws lambda wait function-updated --function-name arbor-webhook-dev
          fi

      - name: Register ECS task definition (dev)
        id: register-task-def-dev
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-agent-dev \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img
               | .runtimePlatform = {"cpuArchitecture": "ARM64", "operatingSystemFamily": "LINUX"}' \
          > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (dev)
        run: |
          aws ecs update-service \
            --cluster arbor-dev \
            --service arbor-agent-dev \
            --task-definition "${{ steps.register-task-def-dev.outputs.task_def_arn }}" \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (dev)
        # If this step fails the service is degraded. Manual rollback:
        #   aws ecs update-service --cluster arbor-dev --service arbor-agent-dev \
        #     --task-definition arbor-agent-dev:<previous-revision>
        run: |
          aws ecs wait services-stable \
            --cluster arbor-dev \
            --services arbor-agent-dev

      - name: Smoke test (dev)
        env:
          API_URL: ${{ secrets.API_URL_DEV }}
        run: |
          # Test 1: bad signature → 401 with non-empty body
          # Checks status code and that the Lambda returned a body (not a gateway
          # error or empty response), without coupling to exact error wording.
          STATUS=$(curl -s -o /tmp/smoke-body -w "%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test 1 failed: expected 401, got $STATUS"
            exit 1
          fi
          if [ ! -s /tmp/smoke-body ]; then
            echo "Smoke test 1 failed: empty response body"
            exit 1
          fi

          # Test 2: nonsense path → 404 (verifies routing is live)
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/no-such-route-xyzzy")
          if [ "$STATUS2" != "404" ]; then
            echo "Smoke test 2 failed: expected 404 on /no-such-route-xyzzy, got $STATUS2"
            exit 1
          fi

          echo "Smoke tests passed."

      - name: Notify merged PRs and record deployed SHA
        if: success()
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Read the previously deployed SHA (may not exist on first deploy)
          PREV_SHA=$(aws ssm get-parameter \
            --name "/arbor/deployed/dev/sha" \
            --query Parameter.Value --output text 2>/dev/null || echo "")

          # Find PRs merged since last deploy and comment on them
          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$SHA" ]; then
            # Get all commits between prev and current deploy
            COMMITS=$(git log --format="%H" "$PREV_SHA".."$SHA" 2>/dev/null || echo "")
            NOTIFIED=""
            for COMMIT in $COMMITS; do
              # Find PR numbers associated with this commit
              PRS=$(gh api "repos/$REPO/commits/$COMMIT/pulls" \
                --jq '.[].number' 2>/dev/null || echo "")
              for PR in $PRS; do
                # Deduplicate — only comment once per PR
                if echo "$NOTIFIED" | grep -qw "$PR"; then continue; fi
                NOTIFIED="$NOTIFIED $PR"
                gh pr comment "$PR" \
                  --repo "$REPO" \
                  --body "🚀 Deployed to **dev** (\`${SHA:0:8}\`)" \
                  2>/dev/null || true
              done
            done
          fi

          # Record this SHA as the new deployed baseline
          aws ssm put-parameter \
            --name "/arbor/deployed/dev/sha" \
            --value "$SHA" \
            --type String \
            --overwrite
