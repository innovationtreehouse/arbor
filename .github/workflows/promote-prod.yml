name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to promote (must be deployed to dev)"
        required: true

permissions:
  id-token: write   # required for OIDC → AWS
  contents: read    # required for checkout
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: none
  statuses: none

concurrency:
  group: promote-prod
  cancel-in-progress: false  # queue rather than cancel — migrations must not interleave

jobs:
  promote:
    name: promote ${{ inputs.sha }} to prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate SHA input
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          if ! echo "$SHA_INPUT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Invalid SHA: must be exactly 40 lowercase hex characters"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Verify SHA is on main
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA_INPUT" origin/main; then
            echo "SHA $SHA_INPUT is not on main — refusing to promote"
            exit 1
          fi
          echo "SHA $SHA_INPUT confirmed on main."

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify SHA was deployed to dev
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          # Fail fast before migrations if this SHA was never built and pushed to dev
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA_INPUT \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "SHA $SHA_INPUT confirmed in ECR."

      - name: Verify image exists and re-tag as prod
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ inputs.sha }}
        run: |
          docker pull $REGISTRY/arbor-agent:$SHA
          docker tag  $REGISTRY/arbor-agent:$SHA $REGISTRY/arbor-agent:prod
          docker push $REGISTRY/arbor-agent:prod

      - name: Scan image for vulnerabilities (prod)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/arbor-agent:${{ inputs.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Download Lambda zip from S3
        env:
          SHA: ${{ inputs.sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws s3 cp s3://$BUCKET/arbor-webhook/$SHA.zip packages/lambda/lambda.zip
          aws s3 cp s3://$BUCKET/arbor-webhook/$SHA.zip.sha256 packages/lambda/lambda.zip.sha256
          EXPECTED=$(cat packages/lambda/lambda.zip.sha256)
          ACTUAL=$(sha256sum packages/lambda/lambda.zip | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch — artifact may have been tampered with"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "Checksum verified: $ACTUAL"

      - name: Run database migrations (prod)
        # Migrations run before code deploy. If a subsequent step fails and you
        # need to roll back, Drizzle has no built-in down migrations — revert by
        # applying a new migration that undoes the schema change.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: cd packages/db && npm run db:migrate

      - name: Deploy Lambda (prod)
        env:
          SHA: ${{ inputs.sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-prod \
            --s3-bucket $BUCKET \
            --s3-key arbor-webhook/$SHA.zip

      - name: Wait for Lambda update (prod)
        run: aws lambda wait function-updated --function-name arbor-webhook-prod

      - name: Register ECS task definition (prod)
        id: register-task-def-prod
        env:
          SHA: ${{ inputs.sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-agent-prod \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img' \
          > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster arbor-prod \
            --service arbor-agent-prod \
            --task-definition ${{ steps.register-task-def-prod.outputs.task_def_arn }} \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (prod)
        # If this step fails the service is degraded. Manual rollback:
        #   aws ecs update-service --cluster arbor-prod --service arbor-agent-prod \
        #     --task-definition arbor-agent-prod:<previous-revision>
        run: |
          aws ecs wait services-stable \
            --cluster arbor-prod \
            --services arbor-agent-prod

      - name: Smoke test (prod)
        env:
          API_URL: ${{ secrets.API_URL_PROD }}
        run: |
          # Test 1: bad signature → 401 with expected body
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test 1 failed: expected 401, got $STATUS"
            exit 1
          fi
          if ! echo "$BODY" | grep -q "Invalid signature"; then
            echo "Smoke test 1 failed: unexpected body: $BODY"
            exit 1
          fi

          # Test 2: unknown path → 404 (verifies routing is live)
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/healthz")
          if [ "$STATUS2" != "404" ]; then
            echo "Smoke test 2 failed: expected 404 on /healthz, got $STATUS2"
            exit 1
          fi

          echo "Smoke tests passed."
