name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to promote (must be deployed to dev)"
        required: true

permissions:
  id-token: write   # required for OIDC → AWS
  contents: read    # required for checkout
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: none
  statuses: none

jobs:
  promote:
    name: promote ${{ inputs.sha }} to prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate SHA input
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          if ! echo "$SHA_INPUT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Invalid SHA: must be exactly 40 lowercase hex characters"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify SHA was deployed to dev
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          # Fail fast before migrations if this SHA was never built and pushed to dev
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA_INPUT \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "SHA $SHA_INPUT confirmed in ECR."

      - name: Verify image exists and re-tag as prod
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ inputs.sha }}
        run: |
          docker pull $REGISTRY/arbor-agent:$SHA
          docker tag  $REGISTRY/arbor-agent:$SHA $REGISTRY/arbor-agent:prod
          docker push $REGISTRY/arbor-agent:prod

      - name: Download Lambda zip from S3
        env:
          SHA: ${{ inputs.sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws s3 cp \
            s3://$BUCKET/arbor-webhook/$SHA.zip \
            packages/lambda/lambda.zip

      - name: Run database migrations (prod)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: cd packages/db && npm run db:migrate

      - name: Deploy Lambda (prod)
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-prod \
            --zip-file fileb://packages/lambda/lambda.zip

      - name: Wait for Lambda update (prod)
        run: aws lambda wait function-updated --function-name arbor-webhook-prod

      - name: Register ECS task definition (prod)
        env:
          SHA: ${{ inputs.sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-agent-prod \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img' \
          > /tmp/task-def.json
          aws ecs register-task-definition --cli-input-json file:///tmp/task-def.json

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster arbor-prod \
            --service arbor-agent-prod \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (prod)
        run: |
          aws ecs wait services-stable \
            --cluster arbor-prod \
            --services arbor-agent-prod

      - name: Smoke test (prod)
        env:
          API_URL: ${{ secrets.API_URL_PROD }}
        run: |
          # Intentionally sends a bad signature to verify the Lambda rejects
          # unauthenticated requests — a 401 means the function is up and
          # signature validation is working.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test failed: expected 401, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed."
