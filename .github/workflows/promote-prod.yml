name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to promote (must be deployed to dev)"
        required: true

permissions:
  id-token: write      # required for OIDC → AWS
  contents: write      # required for checkout, git log, and pushing release tags
  actions: none
  checks: none
  issues: none
  packages: none
  pull-requests: write # required to comment on merged PRs
  statuses: none

concurrency:
  group: promote-prod
  cancel-in-progress: false  # queue rather than cancel — migrations must not interleave

jobs:
  promote:
    name: promote ${{ inputs.sha }} to prod
    runs-on: ubuntu-24.04-arm
    environment: production

    steps:
      - name: Check holdoff
        if: vars.DEPLOY_PAUSED == 'true'
        run: |
          echo "::notice::Deployments are paused (DEPLOY_PAUSED=true). Set the variable to false in repo settings to resume."
          exit 1

      - name: Validate SHA input
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          if ! echo "$SHA_INPUT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Invalid SHA: must be exactly 40 lowercase hex characters"
            exit 1
          fi

      - name: Generate release tag
        id: release-tag
        env:
          SHA: ${{ inputs.sha }}
        run: |
          TAG="prod-$(date -u +%Y%m%d)-${SHA:0:8}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Verify SHA is on main
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA_INPUT" origin/main; then
            echo "SHA $SHA_INPUT is not on main — refusing to promote"
            exit 1
          fi
          echo "SHA $SHA_INPUT confirmed on main."

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify SHA was deployed to dev
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          # Fail fast before migrations if this SHA was never built and pushed to dev
          aws ecr describe-images \
            --repository-name arbor-agent \
            --image-ids imageTag=$SHA_INPUT \
            --query 'imageDetails[0].imageTags' \
            --output text
          echo "SHA $SHA_INPUT confirmed in ECR."

      - name: Pull and tag as prod
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ inputs.sha }}
        run: |
          docker pull $REGISTRY/arbor-agent:$SHA
          docker tag  $REGISTRY/arbor-agent:$SHA $REGISTRY/arbor-agent:prod
          docker push $REGISTRY/arbor-agent:prod
          docker pull $REGISTRY/arbor-agent:migrate-$SHA
          docker tag  $REGISTRY/arbor-agent:migrate-$SHA $REGISTRY/arbor-agent:migrate-prod
          docker push $REGISTRY/arbor-agent:migrate-prod

      - name: Download Lambda zip from S3
        env:
          SHA: ${{ inputs.sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws s3 cp s3://$BUCKET/arbor-webhook/$SHA.zip packages/lambda/lambda.zip
          # Read digest from SSM (written by dev deploy, separate credential scope from S3)
          EXPECTED=$(aws ssm get-parameter \
            --name "/arbor/artifacts/$SHA/sha256" \
            --query Parameter.Value --output text)
          ACTUAL=$(sha256sum packages/lambda/lambda.zip | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch — artifact may have been tampered with"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "Checksum verified: $ACTUAL"

      - name: Register migrate task definition (prod)
        id: register-migrate-task-def-prod
        env:
          SHA: ${{ inputs.sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition arbor-migrate-prod \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:migrate-$SHA" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img
               | .containerDefinitions[0].entryPoint = null
               | .runtimePlatform = {"cpuArchitecture": "ARM64", "operatingSystemFamily": "LINUX"}' \
          > /tmp/migrate-task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/migrate-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Run database migrations (prod)
        # Runs drizzle-kit migrate in a short-lived ECS task inside the VPC,
        # so the DB does not need to be reachable from GitHub Actions runners.
        # Migrations run before code deploy — if a subsequent step fails and you
        # need to roll back, apply a new migration that undoes the schema change.
        env:
          SHA: ${{ inputs.sha }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster arbor-prod \
            --task-definition "${{ steps.register-migrate-task-def-prod.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS_PROD }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID_PROD }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"arbor-migrate\",\"environment\":[{\"name\":\"DATABASE_URL\",\"value\":\"${{ secrets.DATABASE_URL_PROD }}\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster arbor-prod --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster arbor-prod --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations complete."

      - name: Deploy Lambda (prod)
        env:
          SHA: ${{ inputs.sha }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws lambda update-function-code \
            --function-name arbor-webhook-prod \
            --s3-bucket $BUCKET \
            --s3-key arbor-webhook/$SHA.zip

      - name: Wait for Lambda update (prod)
        run: aws lambda wait function-updated --function-name arbor-webhook-prod

      - name: Register ECS task definition (prod)
        id: register-task-def-prod
        env:
          SHA: ${{ inputs.sha }}
          DEPLOY_TAG: ${{ steps.release-tag.outputs.tag }}
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
          REPO: ${{ github.repository }}
        run: |
          PREV_SHA=$(aws ssm get-parameter \
            --name "/arbor/deployed/prod/sha" \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          DIFF_URL=""
          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$SHA" ]; then
            DIFF_URL="https://github.com/$REPO/compare/${PREV_SHA}...${SHA}"
          fi

          aws ecs describe-task-definition \
            --task-definition arbor-agent-prod \
            --query taskDefinition \
          | jq --arg img "$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/arbor-agent:$SHA" \
               --arg sha "$SHA" \
               --arg tag "$DEPLOY_TAG" \
               --arg diff_url "$DIFF_URL" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $img
               | .containerDefinitions[0].environment = (
                   (.containerDefinitions[0].environment // [])
                   | map(select(.name != "GIT_SHA" and .name != "DEPLOY_TAG" and .name != "DEPLOY_DIFF_URL"))
                   + [{"name": "GIT_SHA", "value": $sha},
                      {"name": "DEPLOY_TAG", "value": $tag},
                      {"name": "DEPLOY_DIFF_URL", "value": $diff_url}]
                 )
               | .runtimePlatform = {"cpuArchitecture": "ARM64", "operatingSystemFamily": "LINUX"}' \
          > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster arbor-prod \
            --service arbor-agent-prod \
            --task-definition "${{ steps.register-task-def-prod.outputs.task_def_arn }}" \
            --force-new-deployment

      - name: Wait for ECS service to stabilize (prod)
        # If this step fails the service is degraded. Manual rollback:
        #   aws ecs update-service --cluster arbor-prod --service arbor-agent-prod \
        #     --task-definition arbor-agent-prod:<previous-revision>
        run: |
          aws ecs wait services-stable \
            --cluster arbor-prod \
            --services arbor-agent-prod

      - name: Smoke test (prod)
        env:
          API_URL: ${{ secrets.API_URL_PROD }}
        run: |
          # Test 1: bad signature → 401 with non-empty body
          # Checks status code and that the Lambda returned a body (not a gateway
          # error or empty response), without coupling to exact error wording.
          STATUS=$(curl -s -o /tmp/smoke-body -w "%{http_code}" -X POST "$API_URL/slack/events" \
            -H "Content-Type: application/json" \
            -H "x-slack-request-timestamp: $(date +%s)" \
            -H "x-slack-signature: v0=badhash" \
            -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Smoke test 1 failed: expected 401, got $STATUS"
            exit 1
          fi
          if [ ! -s /tmp/smoke-body ]; then
            echo "Smoke test 1 failed: empty response body"
            exit 1
          fi

          # Test 2: nonsense path → 404 (verifies routing is live)
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/no-such-route-xyzzy")
          if [ "$STATUS2" != "404" ]; then
            echo "Smoke test 2 failed: expected 404 on /no-such-route-xyzzy, got $STATUS2"
            exit 1
          fi

          echo "Smoke tests passed."

      - name: Tag release in git
        if: success()
        env:
          TAG: ${{ steps.release-tag.outputs.tag }}
          SHA: ${{ inputs.sha }}
        run: |
          git tag "$TAG" "$SHA"
          git push origin "$TAG"
          echo "Tagged $SHA as $TAG"

      - name: Notify merged PRs and record deployed SHA
        if: success()
        env:
          SHA: ${{ inputs.sha }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PREV_SHA=$(aws ssm get-parameter \
            --name "/arbor/deployed/prod/sha" \
            --query Parameter.Value --output text 2>/dev/null || echo "")

          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$SHA" ]; then
            COMMITS=$(git log --format="%H" "$PREV_SHA".."$SHA" 2>/dev/null || echo "")
            NOTIFIED=""
            for COMMIT in $COMMITS; do
              PRS=$(gh api "repos/$REPO/commits/$COMMIT/pulls" \
                --jq '.[].number' 2>/dev/null || echo "")
              for PR in $PRS; do
                if echo "$NOTIFIED" | grep -qw "$PR"; then continue; fi
                NOTIFIED="$NOTIFIED $PR"
                gh pr comment "$PR" \
                  --repo "$REPO" \
                  --body "🚀 Deployed to **prod** (\`${SHA:0:8}\`)" \
                  2>/dev/null || true
              done
            done
          fi

          aws ssm put-parameter \
            --name "/arbor/deployed/prod/sha" \
            --value "$SHA" \
            --type String \
            --overwrite
