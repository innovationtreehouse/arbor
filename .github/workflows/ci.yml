name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group:

jobs:
  unit:
    name: test / unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  dev:
    name: test / dev
    runs-on: ubuntu-latest
    needs: unit

    # No database service — this job validates the SQLite developer path,
    # the same experience a contributor gets running the app locally without
    # Docker or a Postgres instance.
    env:
      DATABASE_URL: file:./local.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SQLite developer-flow tests
        # Runs vitest with a path filter of packages/db, scoped further by
        # vitest.integration.config.ts which already limits to *.integration.test.ts.
        # Result: only packages/db SQLite integration tests run — no unit tests,
        # no other packages.
        run: npm run test:dev

  integration:
    name: test / integration
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arbor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/arbor_test
      AWS_REGION: us-east-1
      SLACK_BOT_TOKEN: xoxb-not-real
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: cd packages/db && npm run db:migrate

      - name: Build packages
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

  claude-label-reminder:
    name: Remind to add claude label
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    concurrency:
      group: claude-label-reminder-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Post reminder if not already posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- claude-label-reminder -->"
          already_posted=$(gh pr view "$PR_NUMBER" --repo "$REPO" --comments \
            --json comments \
            | jq -r --arg m "$MARKER" \
                '[.comments[] | select(.body | contains($m))] | length')
          has_label=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels \
            --jq '[.labels[].name] | contains(["claude"]) | if . then 1 else 0 end')

          if [ "$already_posted" -eq 0 ] && [ "$has_label" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "${MARKER}
          Add the \`claude\` label to this PR to request an automated code review. The \`claude/pr-review\` status check will not pass until the label is added and the review has run."
          fi
